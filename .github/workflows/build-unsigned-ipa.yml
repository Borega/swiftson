name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run canonical M002 S04 gate
        run: |
          M002_S04_VERIFY_ALLOW_MISSING_XCODEBUILD=0 \
          bash ios/scripts/verify-m002-s04.sh

      - name: Verify IPA exists
        run: test -f ios/build/ipa/FiliusPad.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FiliusPad-unsigned-ipa
          path: ios/build/ipa/FiliusPad.ipa
          if-no-files-found: error
          retention-days: 14
